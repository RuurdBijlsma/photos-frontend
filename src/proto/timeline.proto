syntax = "proto3";

package api;

// --- Main Timeline (Main library view) ---
message TimelineRatiosResponse {
  repeated TimelineMonthRatios months = 1;
}

message TimelineMonthRatios {
  string month_id = 1;
  int32 count = 2;
  repeated float ratios = 3;
}

message TimelineItemsResponse {
  repeated TimelineMonthItems months = 1;
}

message TimelineMonthItems {
  string month_id = 1;
  repeated TimelineItem items = 2;
}

message TimelineItem {
  string id = 1;
  bool is_video = 2;
  bool has_thumbnails = 3;
  optional int32 duration_ms = 4;
  string timestamp = 5;
}

// --- Simple timeline ---
message SimpleTimelineItem {
  string id = 1;
  bool is_video = 2;
  bool has_thumbnails = 3;
  optional int32 duration_ms = 4;
  float ratio = 6;
}

// --- Album Specific ---
message FullAlbumMediaResponse {
  AlbumInfo album = 1;
  repeated SimpleTimelineItem items = 2;
}

message OrderedMediaResponse {
  repeated SimpleTimelineItem items = 1;
}

message CollaboratorSummary {
  int64 id = 1;
  int32 user_id = 2;
  string name = 3;
  string role = 4;
  optional string avatar_id = 5;
}

message AlbumInfo {
  string id = 1;
  string name = 2;
  optional string description = 3;
  bool is_public = 4;
  int32 owner_id = 5;
  string created_at = 6;
  string sort_mode = 7;
  optional string thumbnail_id = 8;
  optional string first_date = 9;
  optional string last_date = 10;
  repeated CollaboratorSummary collaborators = 11;
}

// --- Search
message SearchResponse {
  repeated SimpleTimelineItem items = 1;
}

enum SuggestionType {
  SEARCH = 0;
  ALBUM = 1;
}

message SearchSuggestion {
  string text = 1;
  SuggestionType suggestion_type = 2;
  optional string id = 3;
}

message SearchSuggestionsResponse {
  repeated SearchSuggestion suggestions = 1;
}

// --- Person
message PersonInfo {
  int64 id = 1;
  optional string name = 2;
  int32 photo_count = 3;
  optional string thumbnail_id = 4;
}

message ListPeopleResponse {
  repeated PersonInfo people = 1;
}

message FullPersonMediaResponse {
  PersonInfo person = 1;
  repeated SimpleTimelineItem items = 2;
}
